<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beheer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <span class="logo" id="kop-naam">🐾 Beheer</span>
      <nav id="beheer-menu" class="verborgen">
        <a href="#" id="menu-agenda" class="actief">Agenda</a>
        <a href="#" id="menu-regels">Factuurregels</a>
        <a href="#" id="menu-facturen">Facturen</a>
        <a href="#" id="menu-tijden">Openingstijden</a>
        <a href="#" id="menu-profiel">Profiel</a>
        <a href="#" id="menu-uitloggen">Uitloggen</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="kaart verborgen" id="niet-beschikbaar">
      <h2>Deze pagina is niet beschikbaar</h2>
      <p>Controleer of de link klopt.</p>
    </div>

    <div class="kaart verborgen" id="login-kaart" style="max-width: 480px; margin: 3rem auto;">
      <h2>Beheer — inloggen</h2>
      <div id="methode-keuze">
        <p>Bevestig dat u het bent. Waar mogen wij de verificatiecode heen sturen?</p>
        <p><button class="knop" id="knop-email">Stuur code naar e-mail (<span id="masker-email"></span>)</button></p>
        <p><button class="knop" id="knop-sms">Stuur code naar sms (<span id="masker-telefoon"></span>)</button></p>
      </div>
      <div id="code-stap" class="verborgen">
        <div class="melding melding-info" id="demo-login-code" role="status"></div>
        <div class="veld">
          <label for="login-code">Verificatiecode</label>
          <input id="login-code" type="text" maxlength="6" autocomplete="off">
          <span class="fout" aria-live="polite" id="fout-login"></span>
        </div>
        <p>
          <button class="knop" id="knop-verifieer">Bevestigen</button>
          <a href="#" id="andere-methode">Andere methode kiezen</a>
        </p>
      </div>
    </div>

    <div id="beheer-app" class="verborgen">
      <div id="view-agenda"></div>
      <div id="view-regels" class="verborgen"></div>
      <div id="view-facturen" class="verborgen"></div>
      <div id="view-tijden" class="verborgen"></div>
      <div id="view-profiel" class="verborgen"></div>
    </div>
  </main>
  <footer class="site-footer">mogelijk gemaakt door OberPoes</footer>
  <script src="js/validatie.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/facturatie.js"></script>
  <script src="js/lijst.js"></script>
  <script src="js/db.js"></script>
  <script src="js/beheer.js"></script>
</body>
</html>
