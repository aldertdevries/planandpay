<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beheer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%232563EB'/%3E%3Crect x='11' y='16' width='26' height='22' rx='4' fill='none' stroke='white' stroke-width='2.5'/%3E%3Cline x1='11' y1='23' x2='37' y2='23' stroke='white' stroke-width='2.5'/%3E%3Ctext x='24' y='35' font-size='14' font-weight='700' fill='white' text-anchor='middle' font-family='sans-serif'%3E%E2%82%AC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <span class="logo">
        <span class="logo-icon" aria-hidden="true"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="10" width="36" height="32" rx="6" fill="#fff" stroke="#2563EB" stroke-width="3"/><path d="M6 19h36" stroke="#2563EB" stroke-width="3"/><rect x="14" y="4" width="4" height="9" rx="2" fill="#2563EB"/><rect x="30" y="4" width="4" height="9" rx="2" fill="#2563EB"/><text x="24" y="37" font-family="Poppins, sans-serif" font-size="19" font-weight="700" fill="#10B981" text-anchor="middle">€</text></svg></span>
        <span id="kop-naam">Beheer</span>
      </span>
      <nav id="beheer-menu" class="verborgen">
        <a href="#" id="menu-agenda" class="actief">Agenda</a>
        <a href="#" id="menu-regels">Factuurregels</a>
        <a href="#" id="menu-facturen">Facturen</a>
        <a href="#" id="menu-tijden">Openingstijden</a>
        <a href="#" id="menu-berichten">Berichten</a>
        <a href="#" id="menu-klanten">Klanten</a>
        <a href="#" id="menu-profiel">Profiel</a>
        <a href="#" id="menu-uitloggen">Uitloggen</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="kaart verborgen" id="niet-beschikbaar">
      <h2>Deze pagina is niet beschikbaar</h2>
      <p>Controleer of de link klopt.</p>
    </div>

    <div class="kaart verborgen" id="login-kaart" style="max-width: 480px; margin: 3rem auto;">
      <h2>Beheer — inloggen</h2>
      <div id="methode-keuze">
        <p>Bevestig dat u het bent. Waar mogen wij de verificatiecode heen sturen?</p>
        <p><button class="knop" id="knop-email">Stuur code naar e-mail (<span id="masker-email"></span>)</button></p>
        <p><button class="knop" id="knop-sms">Stuur code naar sms (<span id="masker-telefoon"></span>)</button></p>
      </div>
      <div id="code-stap" class="verborgen">
        <div class="melding melding-info" id="demo-login-code" role="status"></div>
        <div class="veld">
          <label for="login-code">Verificatiecode</label>
          <input id="login-code" type="text" maxlength="6" autocomplete="off">
          <span class="fout" aria-live="polite" id="fout-login"></span>
        </div>
        <p>
          <button class="knop" id="knop-verifieer">Bevestigen</button>
          <a href="#" id="andere-methode">Andere methode kiezen</a>
        </p>
      </div>
    </div>

    <div id="beheer-app" class="verborgen">
      <div id="view-agenda"></div>
      <div id="view-regels" class="verborgen"></div>
      <div id="view-facturen" class="verborgen"></div>
      <div id="view-tijden" class="verborgen"></div>
      <div id="view-berichten" class="verborgen"></div>
      <div id="view-klanten" class="verborgen"></div>
      <div id="view-profiel" class="verborgen"></div>
    </div>
  </main>
  <footer class="site-footer">mogelijk gemaakt door PlanAndPay</footer>
  <script src="js/validatie.js"></script>
  <script src="js/adres.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/facturatie.js"></script>
  <script src="js/lijst.js"></script>
  <script src="js/kalender.js"></script>
  <script src="js/berichten.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/sessie.js"></script>
  <script src="js/db.js"></script>
  <script src="js/beheer.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/merk.js"></script>
</body>
</html>
