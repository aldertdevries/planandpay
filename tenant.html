<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Afspraak maken</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%232563EB'/%3E%3Crect x='11' y='16' width='26' height='22' rx='4' fill='none' stroke='white' stroke-width='2.5'/%3E%3Cline x1='11' y1='23' x2='37' y2='23' stroke='white' stroke-width='2.5'/%3E%3Ctext x='24' y='35' font-size='14' font-weight='700' fill='white' text-anchor='middle' font-family='sans-serif'%3E%E2%82%AC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    .tenant-kop { display: flex; align-items: center; gap: 1rem; padding: 1.25rem 0 0; }
    .tenant-kop img { width: 72px; height: 72px; border-radius: 10px; border: 1px solid var(--rand); }
    .tenant-kop h1 { margin: 0; font-size: 1.6rem; color: var(--charcoal); }
    .tenant-kop p { margin: 0; color: #666; }
    .keuze-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .keuze-grid .knop-secundair.gekozen { background: var(--charcoal); color: #fff; }
    .keuze-grid button:disabled { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
  </style>
</head>
<body>
  <main class="container">
    <div class="kaart verborgen" id="niet-beschikbaar">
      <h2>Deze pagina is niet beschikbaar</h2>
      <p>Controleer of de link klopt of neem contact op met de organisatie.</p>
    </div>

    <div id="boeking" class="verborgen">
      <div class="tenant-kop">
        <img id="t-logo" alt="Logo">
        <div>
          <h1 id="t-naam"></h1>
          <p id="t-adres"></p>
        </div>
      </div>

      <div class="kaart" id="stap-slot">
        <h2>Maak een afspraak</h2>
        <div class="veld">
          <label>Kies een dag</label>
          <div class="keuze-grid" id="dag-keuze"></div>
        </div>
        <div class="veld verborgen" id="tijd-blok">
          <label>Kies een tijd</label>
          <div class="keuze-grid" id="tijd-keuze"></div>
        </div>
      </div>

      <div class="kaart verborgen" id="stap-gegevens">
        <h2>Uw gegevens</h2>
        <p class="melding melding-info" id="gekozen-slot"></p>
        <p class="melding melding-info verborgen" id="prefill-melding" role="status">Uw gegevens zijn alvast ingevuld — klopt alles nog?</p>
        <form id="afspraakformulier" novalidate>
          <div class="veld">
            <label for="naam">Naam</label>
            <input id="naam" name="name" type="text" autocomplete="name" required>
            <span class="fout" aria-live="polite" id="fout-naam"></span>
          </div>
          <div class="veld">
            <label for="email">E-mailadres</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
            <span class="fout" aria-live="polite" id="fout-email"></span>
          </div>
          <div class="velden-rij">
            <div class="veld">
              <label for="postcode">Postcode</label>
              <input id="postcode" name="postal-code" type="text" autocomplete="postal-code" placeholder="1234 AB" required>
              <span class="fout" aria-live="polite" id="fout-postcode"></span>
            </div>
            <div class="veld">
              <label for="huisnummer">Huisnummer</label>
              <input id="huisnummer" name="address-line2" type="text" autocomplete="address-line2" required>
              <span class="fout" aria-live="polite" id="fout-huisnummer"></span>
            </div>
          </div>
          <div class="velden-rij">
            <div class="veld">
              <label for="straat">Straat</label>
              <input id="straat" type="text" readonly placeholder="vullen wij automatisch in">
            </div>
            <div class="veld">
              <label for="plaats">Plaats</label>
              <input id="plaats" type="text" readonly placeholder="vullen wij automatisch in">
            </div>
          </div>
          <span class="fout" aria-live="polite" id="fout-adres"></span>
          <div class="veld">
            <label for="extra">Extra (optioneel)</label>
            <input id="extra" type="text">
          </div>
          <div class="veld">
            <label for="telefoon">Telefoonnummer</label>
            <input id="telefoon" name="phone" type="tel" autocomplete="tel" placeholder="0612345678" required>
            <span class="fout" aria-live="polite" id="fout-telefoon"></span>
          </div>
          <span class="fout" aria-live="polite" id="fout-boeking"></span>
          <button type="submit" class="knop">Afspraak bevestigen</button>
        </form>
      </div>

      <div class="kaart verborgen" id="stap-klaar">
        <h2>Afspraak bevestigd 🎉</h2>
        <div class="melding melding-goed" id="bevestiging" role="status"></div>
        <div class="melding melding-info" id="bevestiging-mail" role="status"></div>
      </div>
    </div>
  </main>
  <footer class="site-footer">mogelijk gemaakt door PlanAndPay</footer>
  <script src="js/validatie.js"></script>
  <script src="js/adres.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/kalender.js"></script>
  <script src="js/berichten.js"></script>
  <script src="js/db.js"></script>
  <script src="js/tenant.js"></script>
  <script src="js/merk.js"></script>
</body>
</html>
