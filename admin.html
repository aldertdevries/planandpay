<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlanAndPay — beheer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%232563EB'/%3E%3Crect x='11' y='16' width='26' height='22' rx='4' fill='none' stroke='white' stroke-width='2.5'/%3E%3Cline x1='11' y1='23' x2='37' y2='23' stroke='white' stroke-width='2.5'/%3E%3Ctext x='24' y='35' font-size='14' font-weight='700' fill='white' text-anchor='middle' font-family='sans-serif'%3E%E2%82%AC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="admin.html">
        <span class="logo-icon" aria-hidden="true"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="10" width="36" height="32" rx="6" fill="#fff" stroke="#2563EB" stroke-width="3"/><path d="M6 19h36" stroke="#2563EB" stroke-width="3"/><rect x="14" y="4" width="4" height="9" rx="2" fill="#2563EB"/><rect x="30" y="4" width="4" height="9" rx="2" fill="#2563EB"/><text x="24" y="37" font-family="Poppins, sans-serif" font-size="19" font-weight="700" fill="#10B981" text-anchor="middle">€</text></svg></span>
        <span><span class="logo-plan">Plan</span><span class="logo-and">And</span><span class="logo-pay">Pay</span> <small>beheer</small></span>
      </a>
      <nav id="admin-menu" class="verborgen">
        <a href="#" id="menu-dashboard" class="actief">Dashboard</a>
        <a href="#" id="menu-aanvragen">Aanvragen</a>
        <a href="#" id="menu-tenants">Tenants</a>
        <a href="#" id="menu-uitloggen">Uitloggen</a>
      </nav>
    </div>
  </header>
  <main class="container">

    <!-- Login -->
    <div class="kaart" id="login-kaart" style="max-width: 420px; margin: 3rem auto;">
      <h2>Inloggen</h2>
      <div class="veld">
        <label for="gebruikersnaam">Gebruikersnaam</label>
        <input id="gebruikersnaam" type="text" autocomplete="username">
      </div>
      <div class="veld">
        <label for="wachtwoord">Wachtwoord</label>
        <input id="wachtwoord" type="password" autocomplete="current-password">
      </div>
      <span class="fout" aria-live="polite" id="fout-login"></span>
      <button class="knop" id="knop-login">Inloggen</button>
      <p class="melding melding-info">Demo: gebruikersnaam <code>oberpoes</code>, wachtwoord <code>miauw2026</code>.</p>
    </div>

    <!-- Applicatie -->
    <div id="admin-app" class="verborgen">
      <div id="view-dashboard"></div>
      <div id="view-aanvragen" class="verborgen"></div>
      <div id="view-tenants" class="verborgen"></div>
    </div>

  </main>
  <footer class="site-footer">© 2026 PlanAndPay — prototype</footer>
  <script src="js/validatie.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/lijst.js"></script>
  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/merk.js"></script>
</body>
</html>
