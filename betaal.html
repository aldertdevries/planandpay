<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Betalen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%232563EB'/%3E%3Crect x='11' y='16' width='26' height='22' rx='4' fill='none' stroke='white' stroke-width='2.5'/%3E%3Cline x1='11' y1='23' x2='37' y2='23' stroke='white' stroke-width='2.5'/%3E%3Ctext x='24' y='35' font-size='14' font-weight='700' fill='white' text-anchor='middle' font-family='sans-serif'%3E%E2%82%AC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    .checkout { max-width: 420px; margin: 3rem auto; text-align: center; }
    .checkout .bedrag { font-size: 2.2rem; font-weight: 700; color: var(--charcoal); }
  </style>
</head>
<body>
  <main class="container">
    <div class="kaart verborgen checkout" id="niet-beschikbaar">
      <h2>Deze pagina is niet beschikbaar</h2>
      <p>Controleer of de link klopt.</p>
    </div>
    <div class="kaart verborgen checkout" id="checkout">
      <p style="color:#595566; margin-bottom:0">Demo-checkout (Mollie-simulatie)</p>
      <h1 id="b-tenant"></h1>
      <p id="b-omschrijving"></p>
      <p class="bedrag" id="b-bedrag"></p>
      <div id="b-open">
        <button class="knop" id="knop-betaal" style="width:100%">Betalen</button>
      </div>
      <div id="b-betaald" class="verborgen">
        <div class="melding melding-goed">Deze factuur is betaald. Bedankt!</div>
      </div>
      <p style="color:#6a6684; font-size:0.8rem" id="b-mollie"></p>
    </div>
    <div class="kaart verborgen checkout" id="betaal-mail" style="text-align: left;">
      <h2>Mail verzonden (demo)</h2>
      <div class="melding melding-info" id="betaal-mail-inhoud" role="status"></div>
    </div>
  </main>
  <footer class="site-footer">mogelijk gemaakt door PlanAndPay</footer>
  <script src="js/validatie.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/facturatie.js"></script>
  <script src="js/berichten.js"></script>
  <script src="js/db.js"></script>
  <script src="js/betaal.js"></script>
</body>
</html>
